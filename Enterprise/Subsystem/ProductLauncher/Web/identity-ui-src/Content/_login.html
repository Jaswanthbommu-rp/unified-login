<section class="login-page">

    <section class="content">
        <div ng-show="model.loginUrl" class="login-form-container">
            <div class="login-form-header">
                <img src="/login/Content/images/rp-logo2.png">
            </div>
            <div ui-view class="main-content-area"></div>
            <p class="login-copyright">&copy; {{model.copyrightDate}} RealPage, Inc. All rights reserved.</p>
        </div>
        <div class="login-banner-container">
            <ul class="login-banner-tiles">
                <li class="login-banner-tile">
                    <a class="login-banner-tile-link"
                        href="https://www.realpage.com/property-management-software/"
                        target="rpinfo">
                        <img class="login-banner-tile-icon"
                            ng-src="{{layout.svgPath}}/house-with-shield.svg">
                        <span class="login-banner-tile-text">
                            Property<br/>Management
                        </span>
                    </a>
                </li>
                <li class="login-banner-tile">
                    <a class="login-banner-tile-link"
                        href="https://www.realpage.com/resident-services/"
                        target="rpinfo">
                        <img class="login-banner-tile-icon"
                            ng-src="{{layout.svgPath}}/house-with-keyhole.svg">
                        <span class="login-banner-tile-text smaller">
                            Resident<br/>Services
                        </span>
                    </a>
                </li>
                <li class="login-banner-tile">
                    <a class="login-banner-tile-link"
                        href="https://www.realpage.com/yieldstar/"
                        target="rpinfo">
                        <img class="login-banner-tile-icon"
                            ng-src="{{layout.svgPath}}/house-with-chart.svg">
                        <span class="login-banner-tile-text">
                            Asset<br/>Optimization
                        </span>
                    </a>
                </li>
                <li class="login-banner-tile">
                    <a class="login-banner-tile-link"
                        href="https://www.realpage.com/asset-investment-management/"
                        target="rpinfo">
                        <img class="login-banner-tile-icon"
                            ng-src="{{layout.svgPath}}/house-with-dollar-arrow.svg">
                        <span class="login-banner-tile-text">
                            Asset&nbsp;&amp;&nbsp;Investment<br/>Management
                        </span>
                    </a>
                </li>
                <li class="login-banner-tile">
                    <a class="login-banner-tile-link"
                        href="https://www.realpage.com/apartment-marketing/"
                        target="rpinfo">
                        <img class="login-banner-tile-icon"
                            ng-src="{{layout.svgPath}}/house-with-paper-pencil.svg">
                        <span class="login-banner-tile-text">
                            Lease<br/>Management
                        </span>
                    </a>
                </li>
            </ul>
        </div>
