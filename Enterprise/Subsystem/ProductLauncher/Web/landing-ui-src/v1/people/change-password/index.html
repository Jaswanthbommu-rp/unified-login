<div class="change-password">
    <form name="page.changePasswordForm" novalidate role="form"
        class="change-password-form ft-form text-neutral-02">

        <div class="change-pwd-rules">
            <p class="change-pwd-instructions">{{ page.formState.title }}</p>
            <p class="change-pwd-instructions">{{:: "label.rules" | changePasswordText }}</p>

            <ul class="change-pwd-status-indicator">
                <li ng-repeat="currState in page.formState.password" ng-class="{'checked': currState.value}">
                    {{::currState.label}}
                </li>
            </ul>
        </div>

        <fieldset class="change-pwd-fields m-y-md">
            <!-- New Password -->
            <div class="form-group">
                <label class="change-pwd-label" for="createPassword">{{:: "label.newPassword" | changePasswordText }}</label>
                <rp-form-input-text class="change-pswd-text" config="page.passwordConfig.createPassword" rp-model="page.passwordData.createPassword">
                </rp-form-input-text>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label class="change-pwd-label" for="confirmPassword">{{:: "label.confirmPassword" | changePasswordText }}</label>
                <rp-form-input-text class="change-pswd-text" config="page.passwordConfig.confirmPassword" rp-model="page.passwordData.confirmPassword">
                </rp-form-input-text>
            </div>
        </fieldset>

        <div class="change-pwd-actions">
            <div class="form-group" ng-class="{true:'col-md-8', false:'col-md-12'}[page.formState.canCancel]">
                <button class="rp-btn primary"
                    ng-click="page.changePassword()"
                    ng-disabled="page.formState.isSaving"
                    type="button">
                        {{:: "label.changePassword" | changePasswordText }}
                </button>
            </div>
            <div class="form-group" ng-class="{true:'col-md-4', false:'hide'}[page.formState.canCancel]">
                <button class="rp-btn outline primary"
                    ng-click="page.goBack()"
                    type="button">
                        {{:: "label.cancel" | changePasswordText }}
                </button>
            </div>
        </div>

    </form>
</div>
