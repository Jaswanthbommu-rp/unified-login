<div ng-controller="MCProductAccess as mcpa">
    <div rp-accordion-panel
        class="rp-accordion-panel">
        <div class="rp-accordion-panel-title">
            <span class="rp-accordion-panel-title-text">
                {{mcpa.panelName}}
            </span>
        </div>
        <div class="container-fluid">
            <rp-scrolling-tabs-menu model="mcpa.tabsMenu">
            </rp-scrolling-tabs-menu>
            <ng-include 
                ng-repeat="tab in mcpa.tabsList"
                src="tab.incUrl" 
                ng-show="tab.isActive">
            </ng-include>
        </div>
    </div>
</div>
