<div class="properties-wrapper" ng-controller="VendCompPropertiesGridCtrl as vcp">
	<div class="properties-body">
		<div class="vendor-compliance-access-type-label">
			Access Type
		</div>
		<label class="md-check dark-bluebox">
		    <input type="radio" value="property" ng-change="vcp.resetDataModel()" ng-model="vcp.propertySelect" class="has-value">
		    <i class="primary"></i>
		    Specific Property
		</label>
		<label class="md-check dark-bluebox access-type-option">
		    <input type="radio" value="group" ng-change="vcp.resetDataModel()" ng-model="vcp.propertySelect" class="has-value">
		    <i class="primary"></i>
		    Property Group
		</label>
		<label class="md-check dark-bluebox access-type-option">
		    <input type="radio" value="all" ng-change="vcp.resetDataModel()" ng-model="vcp.propertySelect" class="has-value">
		    <i class="primary"></i>
		    All Properties
		</label>
		<div ng-if="vcp.propertySelect == 'property'">
		    <div class="grid-controls">
		        <div class="grid-control-item">
		            <rp-toggle model="vcp.propertiesGrid.filtersModel.state.active" options="{
		                defaultText: 'Filter',
		                activeIconClass: 'rp-icon-filter',
		                defaultIconClass: 'rp-icon-filter active'
		            }">
		            </rp-toggle>
		        </div>
		    </div>
			<rp-grid model="vcp.propertiesGrid" class="vendor-compliance-properties-grid">
			</rp-grid>
			<rp-grid-pagination model="propertiesGridPagination">
			</rp-grid-pagination>
		</div>
		<div ng-if="vcp.propertySelect == 'group'">
		    <div class="grid-controls">
		        <div class="grid-control-item">
		            <rp-toggle model="vcp.propertyGroupGrid.filtersModel.state.active" options="{
		                defaultText: 'Filter',
		                activeIconClass: 'rp-icon-filter',
		                defaultIconClass: 'rp-icon-filter active'
		            }">
		            </rp-toggle>
		        </div>
		    </div>
			<rp-grid model="vcp.propertyGroupGrid" class="vendor-compliance-property-group-grid">
			</rp-grid>
			<rp-grid-pagination model="propertyGroupGridPagination">
			</rp-grid-pagination>
		</div>
		<div class="vendor-compliance-all-properties" ng-if="vcp.propertySelect == 'all'">
		    This user will be provided access to all current and future properties.
		</div>
	</div>
</div>
