<div ng-controller="UserPreferenceCtrl as page">
    <form novalidate  name="userPreferenceForm" rp-focus-invalid-field
    class="rp-focus-invalid-field">
        <div class="row p-y-2">
            <div class="user-products col-md-3">
                <h2 class="assign-products-title-1 pointer" ng-click="page.open = page.open ==true? false: true">
                    Notifications
                    <i class="fa pull-right icon-color"
                        ng-class="page.open===true?'fa-chevron-up': 'fa-chevron-down'"></i>
                </h2>

                <div ng-if="page.open" ng-repeat="category in page.model.data.products[0].items" class="product-list"
                    ng-class="category.isSelected==true?'product-bg':''"><a
                        ng-click="page.menuSelected(category)">{{category.title}}</a>
                </div>
            </div>

            <div class="col-md-7" style="left:5%">
                <div class="font-bold p-b-1 p-l-1 text-xl">
                    {{page.model.data.selectedProductName}}
                </div>
                <div ng-if="page.model.data.selectedProductName==''" class="p-y-2 font-medium">
                    <p>There are no Preferences for the products you have access to</p>
                </div>
                <div ng-repeat="notificationTypeObj in page.model.data.typeData">
                    <div class="font-medium p-y-1 p-l-1 text-lg"> {{notificationTypeObj.productName}} </div>
                    <div class="m-b-2 p-l-2">
                        <div class="row product-type align-items-center"
                            ng-repeat="catArray in notificationTypeObj.catArray">
                            <div class="col-lg-7 m-b-2 mb-lg-0">
                                <div class="p-l-2 p-t-2 font-medium">
                                    {{catArray.categoryName}}
                                </div>
                            </div>
                            <div class="col-lg-5 m-t-1">
                                <rp-form-select-menu config="catArray.config.preferenceConfig"
                                    rp-model="catArray.preferenceInfo">
                                </rp-form-select-menu>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
