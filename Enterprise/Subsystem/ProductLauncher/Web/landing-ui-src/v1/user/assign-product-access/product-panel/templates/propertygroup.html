<div class="property-groups-wrapper" ng-controller="ProductPropertyGroupsGridCtrl as ppg">
    <div class="product-panel-property-group-body" ng-if="!ppg.isDataError && ppg.showPGGrid && !ppg.hideTab">
        <div class="grid-controls">
            <div class="grid-control-item">
                <rp-toggle model="ppg.grid.filtersModel.state.active" options="{
                    defaultText: 'Filter',
                    activeIconClass: 'rp-icon-filter',
                    defaultIconClass: 'rp-icon-filter active'
                }">
                </rp-toggle>
            </div>
        </div>
        <rp-grid model="ppg.grid" class="product-panel-property-group-grid">
        </rp-grid>
        <rp-grid-pagination model="pgGridPagination">
        </rp-grid-pagination>
    </div>
    
    <div class="product-panel-all-properties" ng-if="!ppg.showPGGrid  && !ppg.hideTab">
        This user will be assigned current and new companies automatically.
    </div>

    <div class="product-panel-property-group-error" ng-if="ppg.isDataError">
        {{::ppg.dataErrorReason}}
    </div>

</div>
