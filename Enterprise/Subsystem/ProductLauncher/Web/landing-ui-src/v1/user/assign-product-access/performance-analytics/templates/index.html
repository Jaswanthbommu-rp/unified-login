<div ng-controller="PerformanceAnalyticsProductAccessCtrl as papctrl"
     ng-show="papctrl.isActive()"
     detect-product-change="{onChange: papctrl.setChanged}">
    <h3 class="assign-product-access-title">
        {{papctrl.panelName}}
    </h3>

    <div ng-show="papctrl.productDisabled" class="assign-product-access-error-msg">
        This product cannot be assigned when User Type is Regular user (no email).
    </div>

     <rp-scrolling-tabs-menu model="papctrl.tabsMenu">
        </rp-scrolling-tabs-menu>
        <ng-include
            src="tab.incUrl"
            ng-show="tab.isActive"
            ng-repeat="tab in papctrl.tabsList">
        </ng-include>
</div>
