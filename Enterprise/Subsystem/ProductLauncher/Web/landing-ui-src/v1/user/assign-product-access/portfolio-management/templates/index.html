<div ng-controller="PortfolioManagementProductAccessCtrl as pmctrl"
     ng-show="pmctrl.isActive()"
     detect-product-change="{onChange: pmctrl.setChanged}">
    <h3 class="assign-product-access-title">
        {{pmctrl.panelName}}
    </h3>
     <rp-scrolling-tabs-menu model="pmctrl.tabsMenu">
        </rp-scrolling-tabs-menu>
        <ng-include
            src="tab.incUrl"
            ng-show="tab.isActive"
            ng-repeat="tab in pmctrl.tabsList">
        </ng-include>

</div>
