<div ng-controller="AXMProductAccessCtrl as axmpctrl"
     ng-show="axmpctrl.isActive()"
     detect-product-change="{onChange: axmpctrl.setChanged}">
    <h3 class="assign-product-access-title">
        {{axmpctrl.panelName}}
    </h3>
     <rp-scrolling-tabs-menu model="axmpctrl.tabsMenu">
        </rp-scrolling-tabs-menu>
        <ng-include
            src="tab.incUrl"
            ng-show="tab.isActive"
            ng-repeat="tab in axmpctrl.tabsList">
        </ng-include>

</div>
