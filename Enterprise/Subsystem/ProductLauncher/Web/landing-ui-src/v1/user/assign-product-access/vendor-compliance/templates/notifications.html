<div ng-controller="VendCompNotificationsCtrl as vcn">
	<div class="row">
		<div class="col-xs-10 col-sm-7">
			<rp-switch class="label-1 theme-1"
				rp-model="vcn.vendCompDataModel.data.inputJson.isInsuranceExpired"
				config="vcn.vendorSwitch"
				rp-label-text="'Notify by email when any vendor\'s insurance is about to expire'">
			</rp-switch>
			<hr>
		</div>
		<div class="col-xs-10 col-sm-7">
			<rp-switch class="label-1 theme-1"
				rp-model="vcn.vendCompDataModel.data.inputJson.IsVendorRecommendationChanges"
				config="vcn.vendorSwitch"
				rp-label-text="'Notify by email when any vendor\'s recommendation changes'">
			</rp-switch>
			<hr>
		</div>
		<div class="col-xs-10 col-sm-7">
			<rp-switch class="label-1 theme-1"
				rp-model="vcn.vendCompDataModel.data.inputJson.isVendorNotLinkedToAnyProperty"
				config="vcn.vendorSwitch"
				rp-label-text="'Notify by email when a vendor is not linked to any properties.'">
			</rp-switch>
			<hr>
		</div>
	</div>
</div>
