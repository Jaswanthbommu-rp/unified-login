<div class="on-site-wrap"
    ng-show="opa.isActive()"
    detect-product-change="{onChange: opa.setChanged}"
    ng-controller="OnSiteProductAccess as opa">
    <h3 class="assign-product-access-title">
        {{opa.panelName}}
    </h3>
    <rp-scrolling-tabs-menu model="opa.tabsMenu">
    </rp-scrolling-tabs-menu>
    <ng-include
        ng-repeat="tab in opa.tabsList"
        src="tab.incUrl"
        ng-show="tab.isActive">
    </ng-include>
</div>
