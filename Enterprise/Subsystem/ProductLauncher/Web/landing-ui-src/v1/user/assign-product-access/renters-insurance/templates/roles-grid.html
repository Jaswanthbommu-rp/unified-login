<div class="renters-insurance-roles-wrapper" ng-controller="RentersInsuranceRolesGridCtrl as role">
    <div class="roles-body" ng-if="!role.isDataError">
        <div class="grid-controls">
            <div class="grid-control-item">
                <rp-toggle model="role.grid.filtersModel.state.active" options="{
                    defaultText: 'Filter',
                    activeIconClass: 'rp-icon-filter',
                    defaultIconClass: 'rp-icon-filter active'
                }">
                </rp-toggle>
            </div>
        </div>

        <rp-grid
            ng-if="ripa.isActive()"
            model="role.grid" class="renters-insurance-roles-grid">
        </rp-grid>

        <rp-grid-pagination ng-if="ripa.isActive()" model="gridPagination">
        </rp-grid-pagination>
    </div>
    <div class="roles-body-error" ng-if="role.isDataError">
        {{::role.dataErrorReason}}
    </div>
</div>
