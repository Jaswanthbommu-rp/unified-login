<div
    ng-show="umpa.isActive()"
    detect-product-change="{onChange: umpa.setChanged}"
    ng-controller="UtilityManagementProductAccess as umpa">
    <h3 class="assign-product-access-title">
        {{umpa.panelName}}
    </h3>
    <rp-scrolling-tabs-menu model="umpa.tabsMenu">
    </rp-scrolling-tabs-menu>
    <ng-include
        ng-repeat="tab in umpa.tabsList"
        src="tab.incUrl"
        ng-show="tab.isActive">
    </ng-include>
</div>
