<div class="lead-2-lease-wrap"
    ng-show="l2la.isActive()"
    detect-product-change="{onChange: l2la.setChanged}"
    ng-controller="Lead2LeaseProductAccess as l2la">
    <h3 class="assign-product-access-title">
        {{l2la.panelName}}
    </h3>
    <rp-scrolling-tabs-menu model="l2la.tabsMenu">
    </rp-scrolling-tabs-menu>
    <ng-include
        ng-repeat="tab in l2la.tabsList"
        src="tab.incUrl"
        ng-show="tab.isActive">
    </ng-include>
</div>
