<div ng-controller="RMPropertyListAsideCtrl as rla" class="rp-aside-modal rp-aside-modal-right rm-properties-list-aside">
    <div class="rp-aside-modal-header">
        <span class="rp-aside-modal-close" ng-click="rla.cancel()">
        </span>
        <h2 class="rp-aside-modal-header-title">
            {{::rla.title}}
        </h2>
        <h3 class="rp-aside-modal-header-subtitle">
            {{rla.subtitle}}
        </h3>
    </div>
    <div class="rp-aside-modal-content">
        <div class="rm-properties-list-aside-wrapper">
            <div class="rm-properties-list-aside-aside-body">
                <div class="grid-controls">
                    <div class="grid-control-item">
                        <rp-toggle model="rla.asideGrid.filtersModel.state.active" options="{
                            defaultText: 'Filter',
                            activeIconClass: 'rp-icon-filter',
                            defaultIconClass: 'rp-icon-filter active'
                        }">
                        </rp-toggle>
                    </div>
                </div>
                <rp-grid model="rla.asideGrid" class="rm-properties-list-aside-grid">
                </rp-grid>
                <rp-grid-pagination model="gridPagination">
                </rp-grid-pagination>
            </div>
        </div>
    </div>
</div>
