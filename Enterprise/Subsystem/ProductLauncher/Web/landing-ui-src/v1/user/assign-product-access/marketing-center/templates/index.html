<div class="marketing-access"
    ng-show="mcpa.isActive()"
    detect-product-change="{onChange: mcpa.setChanged}"
    ng-controller="MCProductAccess as mcpa">
    <h3 class="assign-product-access-title">
        {{mcpa.panelName}}
    </h3>

    <rp-scrolling-tabs-menu model="mcpa.tabsMenu">
    </rp-scrolling-tabs-menu>

    <ng-include
        src="tab.incUrl"
        ng-show="tab.isActive"
        ng-repeat="tab in mcpa.tabsList">
    </ng-include>
</div>
