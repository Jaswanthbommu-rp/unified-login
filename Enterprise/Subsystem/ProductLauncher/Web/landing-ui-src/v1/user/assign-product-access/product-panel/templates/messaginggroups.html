<div class="messaging-groups-wrapper" ng-controller="ProductMessageGroupsGridCtrl as mgpr">
    <div class="messaging-groups-body">
        <div class="grid-controls">
            <div class="grid-control-item">
                <rp-toggle model="mgpr.pmgGrid.filtersModel.state.active" options="{
                    defaultText: 'Filter',
                    activeIconClass: 'rp-icon-filter',
                    defaultIconClass: 'rp-icon-filter active'
                }">
                </rp-toggle>
            </div>
        </div>
        <rp-grid ng-if = "mgpr.isActive()" model="mgpr.pmgGrid" class="resident-portals-messaging-groups-grid">
        </rp-grid>
        <rp-grid-pagination model="pmgGridPagination" ng-if = "mgpr.isActive()">
        </rp-grid-pagination>
    </div>
    <div class="messaging-groups-error" ng-if="mgpr.isDataError">
        {{::mgpr.dataErrorReason}}
    </div>
</div>
