<div ng-controller="AEntityGroupAsideCtrl as ega"
    class="rp-aside-modal rp-aside-modal-right accounting-entity-group-aside">
    <div class="rp-aside-modal-header">
        <span class="rp-aside-modal-close"
             ng-click="ega.cancel()">
        </span>
        <h2 class="rp-aside-modal-header-title">
            {{ega.title}}
        </h2>
        <h3 class="rp-aside-modal-header-subtitle">
            {{ega.subtitle}}
        </h3>
    </div>

    <div class="rp-aside-modal-content">
        <div class="entity-groups-aside-wrapper">
            <div class="entity-groups-aside-body">
                <div class="grid-controls">
                    <div class="grid-control-item">
                        <rp-toggle model="ega.asideGrid.filtersModel.state.active" options="{
                            defaultText: 'Filter',
                            activeIconClass: 'rp-icon-filter',
                            defaultIconClass: 'rp-icon-filter active'
                        }">
                        </rp-toggle>
                    </div>
                </div>
                <rp-grid model="ega.asideGrid" class="accounting-entity-groups-aside-grid">
                </rp-grid>
                <rp-grid-pagination model="gridPagination">
                </rp-grid-pagination>
            </div>
            
        </div>
    </div>
</div>
