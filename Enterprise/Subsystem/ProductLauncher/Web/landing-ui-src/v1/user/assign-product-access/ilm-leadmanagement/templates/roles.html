<div class="roles-wrapper" ng-controller="ILMLeadManagementRolesGridCtrl as ilmlmr">
    <div class="roles-body" ng-if="!ilmlmr.isDataError">
        <div class="grid-controls">
            <div class="grid-control-item">
                <rp-toggle model="ilmlmr.rolesGrid.filtersModel.state.active" options="{
                    defaultText: 'Filter',
                    activeIconClass: 'rp-icon-filter',
                    defaultIconClass: 'rp-icon-filter active'
                }">
                </rp-toggle>
            </div>
        </div>

        <rp-grid ng-if="ilmlmpa.isActive()" model="ilmlmr.rolesGrid" class="ilm-lm-roles-grid">
        </rp-grid>

        <rp-grid-pagination ng-if="ilmlmpa.isActive()" model="gridPagination">
        </rp-grid-pagination>
    </div>
    <div class="roles-body-error" ng-if="ilmlmr.isDataError">
        <p>{{::ilmlmr.dataErrorReason}}</p>
    </div>
</div>
