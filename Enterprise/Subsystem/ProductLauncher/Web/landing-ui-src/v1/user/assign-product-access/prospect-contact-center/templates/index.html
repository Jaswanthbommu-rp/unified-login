<div class="prospect-contact-center-wrap"
    ng-show="pcca.isActive()"
    detect-product-change="{onChange: pcca.setChanged}"
    ng-controller="ProspectContactCenterProductAccess as pcca">
    <h3 class="assign-product-access-title">
        {{pcca.panelName}}
    </h3>
    <rp-scrolling-tabs-menu model="pcca.tabsMenu">
    </rp-scrolling-tabs-menu>
    <ng-include
        ng-repeat="tab in pcca.tabsList"
        src="tab.incUrl"
        ng-show="tab.isActive">
    </ng-include>
</div>
