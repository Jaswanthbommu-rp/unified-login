<div class="properties-wrapper" ng-controller="MCPropertiesGridCtrl as mcp">
    <div class="properties-wrapper-body" ng-if="!mcp.isPropertiesError">
        <div class="all-properties">
            <rp-switch  class="inline label-1"
                config="mcp.allPropSwitch"
                rp-model="mcp.IsAssignedNewPropertyByDefault"
                rp-label-text="'Assign new property by default'">
            </rp-switch>
        </div>
        <div class="marketing-center-properties-body">
            <div class="marketing-center-properties-grid">
                <div class="grid-controls">
                    <div class="grid-control-item">
                        <rp-toggle model="mcp.propertiesGrid.filtersModel.state.active" options="{
                            defaultText: 'Filter',
                            activeIconClass: 'rp-icon-filter',
                            defaultIconClass: 'rp-icon-filter active'}">
                        </rp-toggle>
                    </div>
                </div>
                <rp-grid ng-if="mcpa.isActive()" model="mcp.propertiesGrid" >
                </rp-grid>
                <rp-grid-pagination ng-if="mcpa.isActive()" model="gridPagination">
                </rp-grid-pagination>
            </div>
        </div>
    </div>
    <div class="properties-wrapper-error" ng-if="mcp.isPropertiesError">
        {{::mcp.propertiesError}}
    </div>
</div>
