<div class="product-panel-roles-wrapper" ng-controller="ProductTab6GridCtrl as cpr">
    <div ng-if="!cpr.isVendorCredentialProduct()">
        <div class="product-panel-roles-body" ng-if="!cpr.isDataError">
            <div class="grid-controls">
                <div class="grid-control-item">
                    <rp-toggle model="cpr.tab6Grid.filtersModel.state.active" options="{
                        defaultText: 'Filter',
                        activeIconClass: 'rp-icon-filter',
                        defaultIconClass: 'rp-icon-filter active'
                    }">
                    </rp-toggle>
                </div>
            </div>
            <rp-grid ng-if="cpr.isActive()" model="cpr.tab6Grid" class="product-panel-roles-grid">
            </rp-grid>
            <rp-grid-pagination ng-if="cpr.isActive()" model="tab6GridPagination">
            </rp-grid-pagination>
        </div>    
        <div class="product-panel-roles-error" ng-if="cpr.isDataError">
            {{::cpr.dataErrorReason}}
        </div>
    </div>
    <div ng-if="cpr.isVendorCredentialProduct()">
        <div class="product-panel-roles-access-type" ng-if="cpr.radioconfig">
            <div>
                <div>
                    <rp-form-input-radio class="inline marg-r" 
                                         ng-repeat="rad in cpr.radioconfig" 
                                         rp-value="rad.key" 
                                         rp-on-change="cpr.resetVCDataModel(rad.key)" 
                                         rp-model="cpr.propertySelect"
                                         disabled="cpr.hasViewOnlyAccess()"
                                         rp-label-text="rad.text">
                    </rp-form-input-radio>
                </div>
            </div>
        </div>
    </div>
</div>
