<div class="spend-management"
    ng-show="smpa.isActive()"
    detect-product-change="{onChange: smpa.setChanged}"
    ng-controller="SMProductAccessCtrl as smpa">
    <h3 class="assign-product-access-title">
        {{smpa.panelName}}
    </h3>

    <rp-scrolling-tabs-menu model="smpa.tabsMenu">
    </rp-scrolling-tabs-menu>

    <ng-include
        src="tab.incUrl"
        ng-show="tab.isActive"
        ng-repeat="tab in smpa.tabsList">
    </ng-include>
</div>
