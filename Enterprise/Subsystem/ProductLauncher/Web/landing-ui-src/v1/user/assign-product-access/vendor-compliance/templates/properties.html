<div class="properties-wrapper" ng-controller="VendCompPropertiesGridCtrl as vcp">
	<div class="properties-body" ng-if="!vcp.isDataError">
		<div class="vendor-compliance-access-type-label">
			Access Type
		</div>

		<div class="access-type-options">
			<label class="md-check dark-bluebox access-type-option">
			    <input type="radio" value="property" ng-disabled="vcp.isUserHasViewOnlyAccess()" ng-change="vcp.resetDataModel()" ng-model="vcp.propertySelect" class="has-value">
			    <i class="primary"></i>
			    Specific Property
			</label>
			<label class="md-check dark-bluebox access-type-option">
			    <input type="radio" value="group"  ng-disabled="vcp.isUserHasViewOnlyAccess()" ng-change="vcp.resetDataModel()" ng-model="vcp.propertySelect" class="has-value">
			    <i class="primary"></i>
			    Property Group
			</label>
			<label class="md-check dark-bluebox access-type-option">
			    <input type="radio" value="all" ng-disabled="vcp.isUserHasViewOnlyAccess()" ng-change="vcp.resetDataModel()" ng-model="vcp.propertySelect" class="has-value">
			    <i class="primary"></i>
			    All Properties
			</label>
		</div>

		<div ng-if="vcp.propertySelect == 'property'">
		    <div class="grid-controls">
		        <div class="grid-control-item">
		            <rp-toggle model="vcp.propertiesGrid.filtersModel.state.active" options="{
		                defaultText: 'Filter',
		                activeIconClass: 'rp-icon-filter',
		                defaultIconClass: 'rp-icon-filter active'
		            }">
		            </rp-toggle>
		        </div>
		    </div>
			<rp-grid ng-if="vcpa.isActive()" model="vcp.propertiesGrid" class="vendor-compliance-properties-grid">
			</rp-grid>
			<rp-grid-pagination ng-if="vcpa.isActive()" model="propertiesGridPagination">
			</rp-grid-pagination>
		</div>

		<div ng-if="vcp.propertySelect == 'group'">
		    <div class="grid-controls">
		        <div class="grid-control-item">
		            <rp-toggle model="vcp.propertyGroupGrid.filtersModel.state.active" options="{
		                defaultText: 'Filter',
		                activeIconClass: 'rp-icon-filter',
		                defaultIconClass: 'rp-icon-filter active'
		            }">
		            </rp-toggle>
		        </div>
		    </div>
			<rp-grid ng-if="vcpa.isActive()" model="vcp.propertyGroupGrid" class="vendor-compliance-property-group-grid">
			</rp-grid>
			<rp-grid-pagination ng-if="vcpa.isActive()" model="propertyGroupGridPagination">
			</rp-grid-pagination>
		</div>

		<div class="vendor-compliance-all-properties" ng-if="vcp.propertySelect == 'all'">
		    This user will be provided access to all current and future properties.
		</div>
	</div>
	<div class="properties-body-error" ng-if="vcp.isDataError">
		<p>{{::vcp.dataErrorReason}}</p>
	</div>
</div>
