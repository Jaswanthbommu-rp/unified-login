<div ng-show="vcpa.isActive()"
    detect-product-change="{onChange: vcpa.setChanged}"
    ng-controller="VendCompProductAccessCtrl as vcpa">
    <h3 class="assign-product-access-title">
        {{vcpa.panelName}}
    </h3>
    <rp-scrolling-tabs-menu model="vcpa.tabsMenu">
    </rp-scrolling-tabs-menu>
    <ng-include
        ng-repeat="tab in vcpa.tabsList"
        src="tab.incUrl"
        ng-show="tab.isActive">
    </ng-include>
</div>
