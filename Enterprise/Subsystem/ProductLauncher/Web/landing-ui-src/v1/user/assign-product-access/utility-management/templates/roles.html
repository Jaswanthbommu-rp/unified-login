<div class="roles-wrapper" ng-controller="UtilityManagementRolesGridCtrl as umr">
    <div class="roles-body" ng-if="!umr.isDataError">
        <div class="grid-controls">
            <div class="grid-control-item">
                <rp-toggle model="umr.rolesGrid.filtersModel.state.active" options="{
                    defaultText: 'Filter',
                    activeIconClass: 'rp-icon-filter',
                    defaultIconClass: 'rp-icon-filter active'
                }">
                </rp-toggle>
            </div>
        </div>
        <rp-grid model="umr.rolesGrid" class="utility-management-roles-grid">
        </rp-grid>
        <rp-grid-pagination model="gridPagination">
        </rp-grid-pagination>
    </div>
    <div class="roles-body-error" ng-if="umr.isDataError">
        <p>{{::umr.dataErrorReason}}</p>
    </div>
</div>
