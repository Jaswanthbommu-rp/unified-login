<div class="usermgmt-access"
    ng-show="umpa.isActive()"
    detect-product-change="{onChange: umpa.setChanged}"
    ng-controller="UserMgmtProductAccess as umpa">
    <h3 class="assign-product-access-title">
        Unified Platform Product Access
    </h3>

    <div ng-controller="UserMgmtRolesCtrl as umprc">
        <rp-scrolling-tabs-menu
            model="umprc.tabsMenu">
        </rp-scrolling-tabs-menu>
        <ng-include
            src="tab.incUrl"
            ng-show="tab.isActive"
            ng-repeat="tab in umprc.tabsList">
        </ng-include>
    </div>
</div>
