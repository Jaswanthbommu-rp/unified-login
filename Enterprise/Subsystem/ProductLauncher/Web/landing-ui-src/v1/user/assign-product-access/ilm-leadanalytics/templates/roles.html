<div class="roles-wrapper" ng-controller="ILMLeadAnalyticsRolesGridCtrl as ilmlar">
    <div class="roles-body" ng-if="!ilmlar.isDataError">
        <div class="grid-controls">
            <div class="grid-control-item">
                <rp-toggle model="ilmlar.rolesGrid.filtersModel.state.active" options="{
                    defaultText: 'Filter',
                    activeIconClass: 'rp-icon-filter',
                    defaultIconClass: 'rp-icon-filter active'
                }">
                </rp-toggle>
            </div>
        </div>

        <rp-grid ng-if="ilmlapa.isActive()" model="ilmlar.rolesGrid" class="ilm-leasing-roles-grid">
        </rp-grid>

        <rp-grid-pagination ng-if="ilmlapa.isActive()" model="gridPagination">
        </rp-grid-pagination>
    </div>
    <div class="roles-body-error" ng-if="ilmlar.isDataError">
        <p>{{::ilmlar.dataErrorReason}}</p>
    </div>
</div>
