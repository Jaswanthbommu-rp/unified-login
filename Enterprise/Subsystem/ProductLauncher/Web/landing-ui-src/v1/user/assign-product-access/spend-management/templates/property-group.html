<div class="property-groups-wrapper" ng-controller="SMPropertyGroupGridCtrl as smp">
    <div class="property-groups-body" ng-if="!smp.isDataError">
        <div class="grid-controls">
            <div class="grid-control-item">
                <rp-toggle model="smp.propertyGroupGrid.filtersModel.state.active" options="{
                    defaultText: 'Filter',
                    activeIconClass: 'rp-icon-filter',
                    defaultIconClass: 'rp-icon-filter active'
                }">
                </rp-toggle>
            </div>
        </div>

    	<rp-grid ng-if="smpa.isActive()"
            model="smp.propertyGroupGrid"
            class="spend-management-property-groups-grid">
    	</rp-grid>

    	<rp-grid-pagination ng-if="smpa.isActive()" model="gridPagination">
    	</rp-grid-pagination>
    </div>
    <div class="property-groups-error" ng-if="smp.isDataError">
        {{::smp.dataErrorReason}}
    </div>
</div>
