<div ng-controller="EntitiesListAsideCtrl as umrla" class="rp-aside-modal rp-aside-modal-right usermgmt-rights-list-aside">
    <div class="rp-aside-modal-header">
        <span class="rp-aside-modal-close" ng-click="umrla.cancel()">
        </span>
        <h2 class="rp-aside-modal-header-title">
            {{::umrla.title}}
        </h2>
        <h3 class="rp-aside-modal-header-subtitle">
            {{umrla.subtitle}}
        </h3>
    </div>
    <div class="rp-aside-modal-content">
        <div class="usermgmt-rights-list-aside-wrapper">
            <div class="usermgmt-rights-list-aside-body">
                <div class="grid-controls">
                    <div class="grid-control-item">
                        <rp-toggle model="umrla.asideGrid.filtersModel.state.active" options="{
                            defaultText: 'Filter',
                            activeIconClass: 'rp-icon-filter',
                            defaultIconClass: 'rp-icon-filter active'
                        }">
                        </rp-toggle>
                    </div>
                </div>
                <rp-grid model="umrla.asideGrid" class="usermgmt-rights-list-aside-grid">
                </rp-grid>
                <rp-grid-pagination model="gridPagination">
                </rp-grid-pagination>
            </div>
        </div>
    </div>
    <div class="rp-aside-modal-footer rp-aside-modal-footer-btns">
        <button ng-click="umrla.cancel()" class="rp-btn rp-aside-modal-footer-btn outline primary">
            Cancel
        </button>
        <button ng-click="umrla.update()" class="rp-btn rp-aside-modal-footer-btn primary">
            Update
        </button>
    </div>
</div>
