<div class="roles-wrapper" ng-controller="VendCompRolesGridCtrl as vcr">
    <div class="roles-body" ng-if="!vcr.isDataError">
        <div class="grid-controls">
            <div class="grid-control-item">
                <rp-toggle model="vcr.rolesGrid.filtersModel.state.active" options="{
                    defaultText: 'Filter',
                    activeIconClass: 'rp-icon-filter',
                    defaultIconClass: 'rp-icon-filter active'
                }">
                </rp-toggle>
            </div>
        </div>

    	<rp-grid ng-if="vcpa.isActive()" model="vcr.rolesGrid" class="vendor-compliance-roles-grid">
    	</rp-grid>

    	<rp-grid-pagination ng-if="vcpa.isActive()" model="gridPagination">
    	</rp-grid-pagination>
    </div>
    <div class="roles-body-error" ng-if="vcr.isDataError">
        <p>{{::vcr.dataErrorReason}}</p>
    </div>
</div>
