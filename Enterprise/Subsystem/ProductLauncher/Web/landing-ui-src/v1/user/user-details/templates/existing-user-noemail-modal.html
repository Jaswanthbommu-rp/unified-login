
<div class="rp-modal-wrap company-switch" ng-controller="ExistingUserNoEmailModalCtrl as eu">
    <div class="rp-modal" >
        <div class="modal-width rp-modal-dialog add-user-success-modal">
            <div class="rp-modal-header">
                <span class="rp-modal-close" ng-click="eu.dismissModal()"></span>
                <h2 class="rp-modal-header-title">Username already exists in another company</h2>
            </div>
            <div class="rp-modal-content"> 
                <label for="">The username you entered is associated to a user account with user type Regular user (no email).
                    <br>
                This user type is ineligible for multi-company access. Please specify a different username.</label>
            </div>

            <div class="rp-modal-footer">
                <div class="rp-modal-footer-btns add-user-success-modal-footer-btns">                  
                    <button class="rp-modal-footer-btn rp-btn primary add-user-success-modal-footer-btn" ng-click="eu.dismissModal()">
                        Ok
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
