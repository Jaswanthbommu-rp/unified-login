<div class="modal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Custom Roles</h5>
            </div>
            <div class="modal-body p-lg">
                <p>You are about to delete the following role(s) {{ctrl.model.rolesNames}}</p>
                <p>What do you want to do?</p>
            </div>
            <div class="rp-modal-footer">
                <div class="rp-modal-footer-btns">
                    <button type="button" class="rp-modal-footer-btnrp-btn outline primary" ng-click="ctrl.hideModal()">Cancel</button>
                    <button type="button" class="rp-modal-footer-btn rp-btn primary" ng-click="ctrl.confirmDeleteSelectedRoles()">Delete</button>
                </div>
            </div>
        </div>
    </div>
</div>
