<div ng-controller="RolesController as roles" class="assign-products">
    <h2 class="assign-products-title-1">
       Products
    </h2>
    <div rp-accordion="roles.families" class="assign-products-list">
        <div   ng-class="{'expand': family.isActive}" rp-accordion-panel="{instName: family.familyId}" class="assign-product-family rp-accordion-panel" ng-repeat="family in roles.families">
            <h3 class="assign-product-family-title rp-accordion-panel-title">
                <span class="rp-accordion-panel-title-text">
                    {{::family.data.familyName}}
                </span>
            </h3>
            <div class="assign-product-solution" ng-repeat="soln in family.solutions" ng-click="roles.selectSoln(soln)" ng-class="{'selected': soln.selected}">
                <h4 class="assign-product-solution-title">
                    {{soln.titleId}}
                </h4>
            </div>
        </div>
    </div>
</div>
