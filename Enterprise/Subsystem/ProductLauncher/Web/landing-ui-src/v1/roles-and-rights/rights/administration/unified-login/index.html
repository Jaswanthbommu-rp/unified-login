<div ng-controller="UserMgmtRightsCtrl as  UMCtrl" class="usermgmt-rights-details spacer">
    <div>
        <h3 class="rights-grid-section-title">Unified Platform Rights
                    <h3>
            </div>
            <div class=" actions-row">
                <div class="filters">
                    <div class="grid-controls">
                        <div class="grid-control-item">
                            <rp-toggle model="UMCtrl.model.grid.filtersModel.state.active" options="{
                                defaultText: 'Filters',
                                activeIconClass: 'rp-icon-filter',
                                defaultIconClass: 'rp-icon-filter active'
                            }">
                            </rp-toggle>
                        </div>

                    </div>
                </div>
            </div>

            <div class="usermgmt-grid">
                <rp-grid model="UMCtrl.model.grid" class="roles-grid">
                </rp-grid>

                <rp-grid-pagination model="UMCtrl.model.gridPagination">
                </rp-grid-pagination>
            </div>
</div>
