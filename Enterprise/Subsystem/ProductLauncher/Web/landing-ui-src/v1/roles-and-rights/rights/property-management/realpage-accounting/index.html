<div ng-controller="AcctRightsCtrl as  AcCtrl" class="acct-rights-details spacer">
    <div>
        <h3 class="rights-grid-section-title">Financial Suite Rights</h3>
    </div>
    <div class=" actions-row">
        <div class="product-filter">
            <rp-form-select-menu config="AcCtrl.prodConfig.optionsData" rp-model="AcCtrl.filterMenuVal">
            </rp-form-select-menu>
        </div>
        <div class="filters">
            <div class="grid-controls">
                <div class="grid-control-item">
                    <rp-toggle model="AcCtrl.model.grid.filtersModel.state.active" options="{
                        defaultText: 'Filters',
                        activeIconClass: 'rp-icon-filter',
                        defaultIconClass: 'rp-icon-filter active'
                    }">
                    </rp-toggle>
                </div>
            </div>
        </div>
    </div>
    <div class="rights-grid">
        <rp-grid model="AcCtrl.model.grid" class="roles-grid">
        </rp-grid>
        <rp-grid-pagination model="AcCtrl.model.gridPagination">
        </rp-grid-pagination>
    </div>
</div>
