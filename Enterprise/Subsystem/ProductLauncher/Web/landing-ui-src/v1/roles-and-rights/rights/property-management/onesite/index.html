<div ng-controller="OnesiteRightsCtrl as  ORCtrl" class="onesite-rights-details spacer">
    <div>
        <h3 class="rights-grid-section-title">OneSite Rights  <h3>
    </div>
    <div class=" actions-row">
        <div class="product-filter">
            <rp-form-select-menu                        
                config="ORCtrl.prodConfig.optionsData"
                rp-model="ORCtrl.filterMenuVal">
            </rp-form-select-menu>
        </div>
        <div class="filters">
            <div class="grid-controls">
                <div class="grid-control-item">
                    <rp-toggle model="ORCtrl.model.grid.filtersModel.state.active" options="{
                        defaultText: 'Filters',
                        activeIconClass: 'rp-icon-filter',
                        defaultIconClass: 'rp-icon-filter active'
                    }">
                    </rp-toggle>
                </div>
            </div>
        </div>
    </div>
    <div class="onesite-grid">
        <rp-grid model="ORCtrl.model.grid" class="roles-grid">
        </rp-grid>
        <rp-grid-pagination model="ORCtrl.model.gridPagination">
        </rp-grid-pagination>
    </div>
</div>
