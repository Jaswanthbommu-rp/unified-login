<!DOCTYPE html>
<html lang="en" ng-strict-di>

<head>
    <title>My RealPage</title>
    <meta charset="utf-8" />
    <meta name="description" content="Settings App" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-barstyle" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Settings App">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, minimal-ui" />

    <link rel="icon" type="image/x-icon" href="../favicon.ico">

    <script type="module" src="https://cs-cdn.realpage.com/RAUL/omnibar/v1/omnibar/omnibar.esm.js"></script>
    <script nomodule src="https://cs-cdn.realpage.com/RAUL/omnibar/v1/omnibar/omnibar.js"></script>
    <link rel="stylesheet" href="https://cs-cdn.realpage.com/RAUL/omnibar/v1/omnibar/omnibar.css" />

    <!-- <script src="../assets/omnibar/raul.js"></script> -->
</head>

<body class="rp-app-wrap" ng-controller="AppCtrl as app" ng-show="app.ready" ng-class="app.getState()">

    <omnibar-shell product-code="UL" logout-url="/home/logout">

        <omnibar-scope
              slot="scope"
              product="RealPage Unified Platform"
              ng-cloak
        ></omnibar-scope>

        <omnibar-navigation slot="navigation">
        </omnibar-navigation>

        <omnibar-unified-menu slot="unified-menu">

            <omnibar-unified-switcher authenticated="true" slot="switcher">
            </omnibar-unified-switcher>

            <omnibar-unified-notifications
            slot="notifications">
            </omnibar-unified-notifications>

            <omnibar-unified-help
                slot="help"
            ></omnibar-unified-help>

            <div slot="user">
                <omnibar-user-menu-item
                    class="ng-hide"
                    menu-name="Manage Profile">
                    <a href="/manage-profile"
                        class="raul-manage-profile">
                        Manage Profile
                    </a>
                </omnibar-user-menu-item>

                 <omnibar-user-menu-item
                    class="ng-hide"
                    menu-name="Client Portal">
                    <a href="/client-portal"
                        class="raul-client-portal">
                        Client Portal
                    </a>
                </omnibar-user-menu-item>

                <omnibar-user-menu-item
                    class="ng-hide"
                    menu-name="Change Company">
                    <span class="raul-switch-company">
                        Change Company
                    </span>
                </omnibar-user-menu-item>
            </div>

        </omnibar-unified-menu>

        <header slot="header">
            <div class="ul-app-header">
                <rp-breadcrumbs></rp-breadcrumbs>
            </div>
        </header>

        <main slot="page">
            <div ui-view class="rp-app-content">
            </div>
        </main>
    </omnibar-shell>

    <div class="rp-app-footer" ng-if="appLayout.appFooter">
    </div>

    <script type="text/javascript" src="startup/js/scripts.min.js?_={{appVer}}"></script>

</body>

</html>
