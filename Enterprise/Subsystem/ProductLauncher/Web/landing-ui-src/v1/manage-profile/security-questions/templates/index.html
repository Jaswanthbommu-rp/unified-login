<div class="mp-security-questions"
    ng-controller="MpSecurityQuestionsTabCtrl as securityQuestions">
    <form novalidate name="securityQuestionsForm"
        rp-focus-invalid-field rp-track-form-changes>
        <p>If you would like to update your security question please do so below or to reset your password - click the link below</p>

        <div class="security-question"
            ng-repeat="listItem in securityQuestions.questionsList">
            <div class="question">
                <label for="question-{{listItem.index}}">Question</label>

                <rp-form-select-menu
                    config="listItem.questionConfig"
                    rp-model="listItem.data.questionId">
                </rp-form-select-menu>
            </div>

            <div class="custom-question" ng-if="listItem.isCustom()">
                <label for="custom-question-{{listItem.index}}">
                    Custom Question
                </label>

                <rp-form-input-text
                    config="listItem.customQuestionConfig"
                    rp-model="listItem.data.customQuestion">
                </rp-form-input-text>
            </div>

            <div class="answer">
                <label for="answer-{{listItem.index}}">
                    Answer
                </label>

                <rp-form-input-text
                    config="listItem.answerConfig"
                    rp-model="listItem.data.answer">
                </rp-form-input-text>
            </div>

            <hr ng-if="!$last">
        </div>
    </form>
</div>
