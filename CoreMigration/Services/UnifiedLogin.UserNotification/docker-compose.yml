version: '3.8'

services:
  usernotification:
    image: unifiedlogin-usernotification:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unifiedlogin-usernotification
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - UserNotification__IntervalSeconds=60
      - UserNotification__WorkerThreads=5
      - UserNotification__BatchSize=100
      - UserNotification__ConnectionString=Server=sql-server;Database=NotificationDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;
      - UserNotification__NotificationApiBaseUrl=https://api.example.com
    volumes:
      - ./logs:/app/logs
    networks:
      - notification-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  notification-network:
    driver: bridge
