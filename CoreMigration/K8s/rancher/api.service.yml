apiVersion: v1
kind: Service
metadata:
  name: unified-login-coreapiv2-service-$(environmentName)
  labels:
    app: unified-login-coreapiv2
    product: une
    module: unified-login-coreapiv2
    location: rke2    
    environment: $(environmentName)
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: metrics
  selector:
    app: unified-login-coreapiv2
    product: une
    module: unified-login-coreapiv2
    location: rke2
    environment: $(environmentName)
    type: web
    os: linux