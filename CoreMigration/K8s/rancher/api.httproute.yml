apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: unified-login-coreapiv2-httproute-$(environmentName)
  # namespace: unified-login
  labels:
    product: une
    module: unified-login-coreapiv2
    location: rke2
    environment: $(environmentName)
spec:
  hostnames:
    - $(Server.LandingApiHostName)
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: $(K8s.Namespace)
      namespace: gateways
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: unified-login-coreapiv2-service-$(environmentName)
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /apiv2
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /