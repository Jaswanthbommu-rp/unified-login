apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifiedloginlanding-apienterprise-$(environmentName)
  # namespace: unified-login
  labels:
    product: une
    module: unifiedloginlanding-apienterprise
    location: rke2
    type: web
    os: linux
    environment: $(environmentName)
    app: unifiedloginlanding-apienterprise
    version: v1
spec:
  replicas: $(K8S_API_REPLICAS)
  selector:
    matchLabels:
      product: une
      module: unifiedloginlanding-apienterprise
      location: rke2
      type: web
      os: linux
      environment: $(environmentName)
      app: unifiedloginlanding-apienterprise
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        product: une
        module: unifiedloginlanding-apienterprise
        location: rke2
        type: web
        os: linux
        environment: $(environmentName)
        app: unifiedloginlanding-apienterprise
        version: v1
    spec:
      containers:
      - name: unifiedloginlanding-apienterprise
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image: $(K8s.LandingApiEnterpriseImage)/apienterprise:${BUILD_BUILDNUMBER} 
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 8081
          name: metrics
          protocol: TCP
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: unifiedloginlanding-apienterprise-config-$(environmentName)
        - secretRef:
            name: unifiedloginlanding-apienterprise-secrets-$(environmentName)
        
        # Resource limits and requests
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Startup probe for slower starting applications
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
      
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Image pull secrets (if using private registry)
      imagePullSecrets:
      - name: acr-secret  # Create this secret with your registry credentials
---
  apiVersion: v1
  kind: Service
  metadata:
    name: unifiedloginlanding-apienterprise-service-$(environmentName)
    # namespace: unified-login
    labels:
      product: une
      module: unifiedloginlanding-apienterprise
      location: rke2     
      environment: $(environmentName)
      app: unifiedloginlanding-apienterprise
  spec:
    type: ClusterIP
    ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: metrics
    selector:
      app: unifiedloginlanding-apienterprise
      product: une
      module: unifiedloginlanding-apienterprise
      location: rke2     
      environment: $(environmentName)
      type: web
      os: linux
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: unifiedloginlanding-apienterprise-hpa-$(environmentName)
  # namespace: unified-login
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: unifiedloginlanding-apienterprise-$(environmentName)
  minReplicas: $(K8S_API_REPLICAS)
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: unifiedloginlanding-apienterprise-httproute-$(environmentName)
  # namespace: unified-login
  labels:
    product: une
    module: unifiedloginlanding-apienterprise
    location: rke2
    environment: $(environmentName)
spec:
  hostnames:
    - $(Server.ApiHostName)
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: $(K8s.Namespace)
      namespace: gateways
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: unifiedloginlanding-apienterprise-service-$(environmentName)
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
