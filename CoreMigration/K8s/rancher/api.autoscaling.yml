apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: unifiedloginlanding-api-hpa-$(environmentName)
  # namespace: unified-login
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: unifiedloginlanding-api-$(environmentName)
  minReplicas: $(K8S_API_REPLICAS)
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80