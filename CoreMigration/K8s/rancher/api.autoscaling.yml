apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: unified-login-coreapiv2-hpa-$(environmentName)  
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: unified-login-coreapiv2-$(environmentName)
  minReplicas: $(K8S_MIN_REPLICAS)
  maxReplicas: $(K8S_MAX_REPLICAS)
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Pods
          value: 4
          periodSeconds: 15
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      selectPolicy: Min
      policies:
        - type: Percent
          value: 10
          periodSeconds: 600
        - type: Pods
          value: 1
          periodSeconds: 60