apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifiedloginlanding-apienterprise-$(environmentName)
  # namespace: unified-login
  labels:
    product: une
    module: unifiedloginlanding-apienterprise
    location: rke2
    type: web
    os: linux
    environment: $(environmentName)
    app: unifiedloginlanding-apienterprise
    version: v1
spec:
  replicas: $(K8S_API_REPLICAS)
  selector:
    matchLabels:
      product: une
      module: unifiedloginlanding-apienterprise
      location: rke2
      type: web
      os: linux
      environment: $(environmentName)
      app: unifiedloginlanding-apienterprise
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        product: une
        module: unifiedloginlanding-apienterprise
        location: rke2
        type: web
        os: linux
        environment: $(environmentName)
        app: unifiedloginlanding-apienterprise
        version: v1
    spec:
      containers:
      - name: unifiedloginlanding-apienterprise
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image: $(K8s.LandingApiEnterpriseImage)/apienterprise:${BUILD_BUILDNUMBER} 
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 8081
          name: metrics
          protocol: TCP
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: unifiedloginlanding-apienterprise-config-$(environmentName)
        - secretRef:
            name: unifiedloginlanding-apienterprise-secrets-$(environmentName)
        
        # Resource limits and requests
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Startup probe for slower starting applications
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
      
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Image pull secrets (if using private registry)
      # imagePullSecrets:
      # - name: acr-secret  Create this secret with your registry credentials