apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-login-coreapienterprisev2-$(environmentName)
  # namespace: unified-login
  labels:
    product: une
    module: unified-login-coreapienterprisev2
    location: rke2
    type: web
    os: linux
    environment: $(environmentName)
    app: unified-login-coreapienterprisev2
    version: v1
spec:
  replicas: $(K8s.EnterpriseApiReplicas)
  selector:
    matchLabels:
      product: une
      module: unified-login-coreapienterprisev2
      location: rke2
      type: web
      os: linux
      environment: $(environmentName)
      app: unified-login-coreapienterprisev2  
  template:
    metadata:
      labels:
        product: une
        module: unified-login-coreapienterprisev2
        location: rke2
        type: web
        os: linux
        environment: $(environmentName)
        app: unified-login-coreapienterprisev2
        version: v1
    spec:
      securityContext:
        runAsUser: 1000
      containers:
      - name: unified-login-coreapienterprisev2
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image: $(K8s.LandingApiEnterpriseImage):$(BUILD_BUILDNUMBER)
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: health-check       
        env:
        - name: K8S_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: service.instance.id
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
              
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: unified-login-coreapienterprisev2-config-$(environmentName)
        - secretRef:
            name: unifiedloginmain-secrets-$(environmentName)
        
        # Resource limits and requests
        resources:
          requests:
            cpu: 500m
            memory: 768Mi
          limits:
            cpu: 1
            memory: 1Gi
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /alive
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 2

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 3

        startupProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 15
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3