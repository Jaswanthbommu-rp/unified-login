apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifiedloginlanding-apienterprise-$(environmentName)
  # namespace: unified-login
  labels:
    product: une
    module: unifiedloginlanding-apienterprise
    location: rke2
    type: web
    os: linux
    environment: $(environmentName)
    app: unifiedloginlanding-apienterprise
    version: v1
spec:
  replicas: $(K8S_API_REPLICAS)
  selector:
    matchLabels:
      product: une
      module: unifiedloginlanding-apienterprise
      location: rke2
      type: web
      os: linux
      environment: $(environmentName)
      app: unifiedloginlanding-apienterprise
  # strategy:
  #   type: RollingUpdate
  #   rollingUpdate:
  #     maxSurge: 1
  #     maxUnavailable: 0
  template:
    metadata:
      labels:
        product: une
        module: unifiedloginlanding-apienterprise
        location: rke2
        type: web
        os: linux
        environment: $(environmentName)
        app: unifiedloginlanding-apienterprise
        version: v1
    spec:
      containers:
      - name: unifiedloginlanding-apienterprise
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image: $(K8s.LandingApiEnterpriseImage):${BUILD_BUILDNUMBER} 
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: health-check
        #   protocol: TCP
        # - containerPort: 8081
        #   name: metrics
        #   protocol: TCP
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: unifiedloginlanding-apienterprise-config-$(environmentName)
        - secretRef:
            name: unifiedloginlanding-apienterprise-secrets-$(environmentName)
        
        # Resource limits and requests
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: health-check            
          initialDelaySeconds: 15
          periodSeconds: 600
          timeoutSeconds: 3
          failureThreshold: 1
        
        # readinessProbe:
        #   httpGet:
        #     path: /health/ready
        #     port: 8080
        #     scheme: HTTP
        #   initialDelaySeconds: 10
        #   periodSeconds: 5
        #   timeoutSeconds: 3
        #   failureThreshold: 3
        
        # Startup probe for slower starting applications
        # startupProbe:
        #   httpGet:
        #     path: /health/startup
        #     port: 8080
        #     scheme: HTTP
        #   initialDelaySeconds: 0
        #   periodSeconds: 10
        #   timeoutSeconds: 3
        #   failureThreshold: 30
      
      # Security context
      securityContext:
        runAsUser: 1000
        # runAsNonRoot: true        
        # fsGroup: 1000
      
      # Image pull secrets (if using private registry)
      # imagePullSecrets:
      # - name: acr-secret  Create this secret with your registry credentials