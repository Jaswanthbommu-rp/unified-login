apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifiedloginlanding-api-$(environmentName)
  # namespace: unified-login
  labels:
    product: une
    module: unifiedloginlandingapi
    location: rke2
    type: web
    os: linux
    environment: $(environmentName)
    app: unifiedloginlanding-api
    version: v1
spec:
  replicas: $(K8s.LandingApiReplicas)
  selector:
    matchLabels:
      product: une
      module: unifiedloginlandingapi
      location: rke2
      type: web
      os: linux
      app: unifiedloginlanding-api
      environment: $(environmentName)
  template:
    metadata:
      labels:
        product: une
        module: unifiedloginlandingapi
        location: rke2
        type: web
        os: linux
        environment: $(environmentName)
        app: unifiedloginlanding-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 10000       
      containers:
      - name: unifiedloginlanding-api
        securityContext:          
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image: $(K8s.LandingApiImage):$(BUILD_BUILDNUMBER) 
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: health-check       
        
        envFrom:
        - configMapRef:
            name: unifiedloginlanding-api-config-$(environmentName)
        - secretRef:
            name: unifiedloginmain-secrets-$(environmentName)

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        
        # livenessProbe:
