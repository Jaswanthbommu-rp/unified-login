apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifiedloginlanding-api-$(environmentName)
  # namespace: unified-login
  labels:
    product: une
    module: unifiedloginlanding
    location: rke2
    type: web
    os: linux
    environment: $(environmentName)
    app: unifiedloginlanding-api
    version: v1
spec:
  replicas: $(K8S_API_REPLICAS)
  selector:
    matchLabels:
      product: une
      module: unifiedloginlanding
      location: rke2
      type: web
      os: linux
      environment: $(environmentName)
  template:
    metadata:
      labels:
        product: une
        module: unifiedloginlanding
        location: rke2
        type: web
        os: linux
        environment: $(environmentName)
        app: unifiedloginlanding-api
    spec:
      securityContext:
        runAsUser: 1000           
      containers:
      - name: unifiedloginlanding-api
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image: $(K8s.LandingApiImage):${BUILD_BUILDNUMBER} 
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: health-check
        #   protocol: TCP
        # - containerPort: 8081
        #   name: metrics
        #   protocol: TCP
        
        envFrom:
        - configMapRef:
            name: unifiedloginlanding-api-config-$(environmentName)
        - secretRef:
            name: unifiedloginlanding-api-secrets-$(environmentName)

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        
        livenessProbe:
          httpGet:
            path: /health
            port: health-check           
          initialDelaySeconds: 15
          periodSeconds: 600
          timeoutSeconds: 3
          failureThreshold: 1
        
        # readinessProbe:
        #   httpGet:
        #     path: /health/ready
        #     port: 8080
        #     scheme: HTTP
        #   initialDelaySeconds: 10
        #   periodSeconds: 5
        #   timeoutSeconds: 3
        #   failureThreshold: 3
        
        # startupProbe:
        #   httpGet:
        #     path: /health/startup
        #     port: 8080
        #     scheme: HTTP
        #   initialDelaySeconds: 0
        #   periodSeconds: 10
        #   timeoutSeconds: 3
        #   failureThreshold: 30