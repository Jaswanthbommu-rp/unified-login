apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-login-coreapiv2-$(environmentName)
  # namespace: unified-login
  labels:
    product: une
    module: unified-login-coreapiv2
    location: rke2
    type: web
    os: linux
    environment: $(environmentName)
    app: unified-login-coreapiv2
    version: v1
spec:
  replicas: $(K8s.LandingApiReplicas)
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      product: une
      module: unified-login-coreapiv2
      location: rke2
      type: web
      os: linux
      app: unified-login-coreapiv2
      environment: $(environmentName)
  template:
    metadata:
      labels:
        product: une
        module: unified-login-coreapiv2
        location: rke2
        type: web
        os: linux
        environment: $(environmentName)
        app: unified-login-coreapiv2
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: unified-login-coreapiv2
              topologyKey: kubernetes.io/hostname
      containers:
      - name: unified-login-coreapiv2
        securityContext:          
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image: $(K8s.LandingApiImage):$(BUILD_BUILDNUMBER) 
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 8081
          name: metrics
          protocol: TCP
        
        envFrom:
        - configMapRef:
            name: unified-login-coreapiv2-config-$(environmentName)
        - secretRef:
            name: unifiedloginmain-secrets-$(environmentName)

        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30

        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        lifecycle:
          preStop:
            exec:
              command: ["sleep", "5"]