apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-login-coreapiv2-$(environmentName)
  # namespace: unified-login
  labels:
    product: une
    module: unified-login-coreapiv2
    location: rke2
    type: web
    os: linux
    environment: $(environmentName)
    app: unified-login-coreapiv2
    version: v1
spec:
  replicas: $(K8s.LandingApiReplicas)
  selector:
    matchLabels:
      product: une
      module: unified-login-coreapiv2
      location: rke2
      type: web
      os: linux
      app: unified-login-coreapiv2
      environment: $(environmentName)
  template:
    metadata:
      labels:
        product: une
        module: unified-login-coreapiv2
        location: rke2
        type: web
        os: linux
        environment: $(environmentName)
        app: unified-login-coreapiv2
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 10000
      containers:
      - name: unified-login-coreapiv2
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image: $(K8s.LandingApiImage):$(BUILD_BUILDNUMBER)
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: health-check
        env:
        - name: K8S_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: service.instance.id
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        
        envFrom:  
        - configMapRef:
            name: unified-login-coreapiv2-config-$(environmentName)
        - secretRef:
            name: unifiedloginmain-secrets-$(environmentName)

        resources:
          requests:
            cpu: 500m
            memory: 768Mi
          limits:
            cpu: 1
            memory: 1Gi

        livenessProbe:
          httpGet:
            path: /alive
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 2

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 3

        startupProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 15
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3