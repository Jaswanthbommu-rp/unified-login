        dest: D:\Identity\prod\DB_Deploy
    - name: Copying POwershell File to windows server
      ansible.builtin.template:
        src: copy-dacpac-db-derver.j2
        dest: C:\Users\vradmin\Desktop\copy-dacpac-db-derver.ps1
        force: yes
    # - name: Execute the powershell script
    #   win_shell: D:\Identity\prod\Scripts\SQL_DatabaseBackup_PS1.ps1
    - name: Copy files from web server to db server
      win_shell: scp D:\Identity\prod\DB_Deploy\* vradmin@10.34.26.21:D:\Identity\prod\DB_Deploy
      