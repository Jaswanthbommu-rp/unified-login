steps:
- checkout: none

- task: JFrogToolsInstaller@1
  inputs:
    artifactoryConnection: 'artifactoryV2-IntEnv'
    cliInstallationRepo: 'jfrog-cli-v2'

- task: JFrogGenericArtifacts@1
  displayName: 'Download db artifact'
  inputs:
    command: 'Download'
    connection: 'artifactoryV2-IntEnv'
    specSource: 'taskConfiguration'
    fileSpec: |
      {
        "files": [
          {
            "pattern": "rp-deployables-local/uty/UnifiedLogin/ULDB/$(buildNumber).zip",
            "target": "$(System.DefaultWorkingDirectory)/db/",
            "explode": "true"
          }
        ]
      } 
- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: |
      ls $(System.DefaultWorkingDirectory)/db/uty/UnifiedLogin/ULDB/DB_Identity/
      cd $(System.DefaultWorkingDirectory)/db/uty/UnifiedLogin/ULDB/DB_Identity/
      pwd

