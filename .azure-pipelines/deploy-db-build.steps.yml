#Your build pipeline references a secret variable named ‘SQLServerPassword’. Create or edit the build pipeline for this YAML file, define the variable on the Variables tab, and then select the option to make it secret. See https://go.microsoft.com/fwlink/?linkid=865972

- task: IISWebAppDeploymentOnMachineGroup@0
  displayName: 'Deploy IIS Website/App: home'
  inputs:
    WebSiteName: 'wwwUL\home'
    Package: 'c:\BuildDrops\LandingWeb\Landing.zip'
    SetParametersFile: 'c:\BuildDrops\LandingWeb\Landing.SetParameters.xml'
    RemoveAdditionalFilesFlag: true
    TakeAppOfflineFlag: true
    AdditionalArguments: '-setParam:name=''IdpConfigurationDb-Web.config Connection String'',value=''Application Name=Landing;Data Source=$(SQLServerServerName);Initial Catalog=$(SQLServerServerDatabase);user id=identityserver; password=$(SQLServerPassword);Connect Timeout=30;'''

#Your build pipeline references a secret variable named ‘SQLServerPassword’. Create or edit the build pipeline for this YAML file, define the variable on the Variables tab, and then select the option to make it secret. See https://go.microsoft.com/fwlink/?linkid=865972

- task: IISWebAppDeploymentOnMachineGroup@0
  displayName: 'Deploy IIS Website/App: landing api'
  inputs:
    WebSiteName: 'wwwUL2\api'
    Package: 'c:\BuildDrops\LandingAPI\Service.LandingAPI.zip'
    SetParametersFile: 'c:\BuildDrops\LandingApi\Service.LandingAPI.SetParameters.xml'
    RemoveAdditionalFilesFlag: true
    TakeAppOfflineFlag: true
    AdditionalArguments: '-setParam:name=''IdpConfigurationDb-Web.config Connection String'',value=''Application Name=LandingAPI;Data Source=$(SQLServerServerName);Initial Catalog=$(SQLServerServerDatabase);user id=identityserver; password=$(SQLServerPassword);Connect Timeout=30;'''

#Your build pipeline references a secret variable named ‘SQLServerPassword’. Create or edit the build pipeline for this YAML file, define the variable on the Variables tab, and then select the option to make it secret. See https://go.microsoft.com/fwlink/?linkid=865972

- task: IISWebAppDeploymentOnMachineGroup@0
  displayName: 'Deploy IIS Website/App: landing enterprise api'
  inputs:
    WebSiteName: 'wwwUL2\apienterprise'
    Package: 'c:\BuildDrops\LandingAPIEnterprise\Service.LandingAPIEnterprise.zip'
    SetParametersFile: 'c:\BuildDrops\LandingAPIEnterprise\Service.LandingAPIEnterprise.SetParameters.xml'
    RemoveAdditionalFilesFlag: true
    TakeAppOfflineFlag: true
    AdditionalArguments: '-setParam:name=''IdpConfigurationDb-Web.config Connection String'',value=''Application Name=LandingAPIEnterprise;Data Source=$(SQLServerServerName);Initial Catalog=$(SQLServerServerDatabase);user id=identityserver; password=$(SQLServerPassword);Connect Timeout=30;'''

- task: IISWebAppDeploymentOnMachineGroup@0
  displayName: 'Deploy IIS Website/App: coreapi'
  inputs:
    WebSiteName: 'wwwUL2\apicore'
    Package: 'c:\BuildDrops\CoreAPI\UnifiedLogin.Api.zip'
    RemoveAdditionalFilesFlag: true
    TakeAppOfflineFlag: true
    JSONFiles: appsettings.json

- task: IISWebAppDeploymentOnMachineGroup@0
  displayName: 'Deploy IIS Website/App: coreapienterprise'
  inputs:
    WebSiteName: 'wwwUL2\apicoreenterprise'
    Package: 'c:\BuildDrops\CoreAPIEnterprise\UnifiedLogin.ApiEnterprise.zip'
    RemoveAdditionalFilesFlag: true
    TakeAppOfflineFlag: true
    JSONFiles: appsettings.json

- powershell: 'robocopy c:\BuildDrops\unity-ci\ d:\iis\landing\  /E /w:30 /r:20'
  ignoreLASTEXITCODE: true
  displayName: 'PowerShell Script copy'

- task: qetza.replacetokens.replacetokens-task.replacetokens@3
  displayName: 'Replace tokens in IIS'
  inputs:
    rootDirectory: 'd:\iis'
    targetFiles: |
     identity\content\app\js\*.js
     landing\new-user\app\js\*.js
     landing\v1\app\js\*.js
     landing\index.html
     
- task: PowerShell@2
  displayName: 'PowerShell Script restart webs'
  inputs:
    targetType: filePath
    filePath: 'd:\iis\Post Release WWWFULL UnifiedUI Enterprise.ps1'
  continueOnError: true

- task: jabbera.windows-service-release-tasks.start-windows-service-task.StartWindowsService@8
  displayName: 'Start Windows Service: UnityBatchProcessor'
  inputs:
    ServiceNames: UnityBatchProcessor
    deploymentGroup: true

- task: jabbera.windows-service-release-tasks.start-windows-service-task.StartWindowsService@8
  displayName: 'Start Windows Service: UnityGBUserNotificationMC'
  inputs:
    ServiceNames: UnityGBUserNotificationMC
    deploymentGroup: true