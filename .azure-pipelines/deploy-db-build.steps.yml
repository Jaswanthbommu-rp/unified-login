#    connection: 'artifactoryV2-IntEnv'
#    fileSpec: |
#     {
#       "files": [
#         {
#           "pattern": "rp-deployables-local/uty/UnifiedLogin/ID4/$(artifact_build_number_id4).zip",
#           "target": "unified-login-core-id4/"
#         }
#       ]
#     }

- task: JFrogGenericArtifacts@1
  displayName: 'Artifactory Generic Download Master'
  inputs:
    command: 'Download'
    connection: 'artifactoryV2-IntEnv'
    fileSpec: |
     {
       "files": [
         {
           "pattern": "rp-deployables-local/uty/UnifiedLogin/Master/$(artifact_build_number_master).zip",
           "target": "unified-login-master/",
           "explode": "true"
         }
       ]
     }    

- task: JFrogGenericArtifacts@1
  displayName: 'Artifactory Generic Download CoreAPI'
  inputs:
    command: 'Download'
    connection: 'artifactoryV2-IntEnv'
    fileSpec: |
     {
       "files": [
         {
           "pattern": "rp-deployables-local/uty/UnifiedLogin/CoreAPI/$(artifact_build_number_coreapi).zip",
           "target": "unified-login-core-api/",
            "explode": "true"
         }
       ]
     }    

- task: CopyFiles@2
  displayName: 'Copy Files to: c:\builddrops\unity-ci'
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)/unified-login-landing-ui/uty/UnifiedLogin/LandingRelease/landing-ui'
    TargetFolder: 'c:\builddrops\unity-ci'
    CleanTargetFolder: true
    OverWrite: true

- task: qetza.replacetokens.replacetokens-task.replacetokens@3
  displayName: 'Replace tokens in Unity-CI'
  inputs:
    rootDirectory: 'c:\builddrops\unity-ci'
    targetFiles: |
     *.js
     assets\js\*.js
    escapeType: none

- task: CopyFiles@2
  displayName: 'Copy Files to: d:\iis\scripts'
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)/_unified-login-scripts'
    TargetFolder: 'd:\iis'
    OverWrite: true

- task: CopyFiles@2
  displayName: 'Copy Files to: LandingAPI_drop'
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)/unified-login-master/uty/UnifiedLogin/Master/WebDeploy/LandingAPI_PkgDeploy'
    TargetFolder: 'c:\BuildDrops\LandingAPI\'
    CleanTargetFolder: true

- task: CopyFiles@2
  displayName: 'Copy Files to: LandingFull_drop'
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)/unified-login-master/uty/UnifiedLogin/Master/WebDeploy/LandingFull_PkgDeploy'
    TargetFolder: 'c:\BuildDrops\LandingWeb\'
    CleanTargetFolder: true
    OverWrite: true

#- task: CopyFiles@2
#  displayName: 'Copy Files to: Identity4'
#  inputs:
#    SourceFolder: '$(System.DefaultWorkingDirectory)/unified-login-core-id4/uty/UnifiedLogin/ID4'
#    TargetFolder: 'c:\BuildDrops\Identity4\'
#    CleanTargetFolder: true

- task: CopyFiles@2
  displayName: 'Copy Files to: LandingAPIEnterprise_drop'
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)/unified-login-master/uty/UnifiedLogin/Master/WebDeploy/LandingAPIEnterprise_PkgDeploy'
    TargetFolder: 'c:\BuildDrops\LandingAPIEnterprise\'
    CleanTargetFolder: true

- task: CopyFiles@2
  displayName: 'Copy Files to: Core API'
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)/unified-login-core-api/uty/UnifiedLogin/CoreAPI/apicore/'
    Contents: UnifiedLogin.Api.zip
    TargetFolder: 'c:\BuildDrops\CoreAPI\'
    CleanTargetFolder: true

- task: CopyFiles@2
  displayName: 'Copy Files to: Core API Enterprise'
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)/unified-login-core-api/uty/UnifiedLogin/CoreAPI/apicore/'
    Contents: UnifiedLogin.ApiEnterprise.zip
    TargetFolder: 'c:\BuildDrops\CoreAPIEnterprise\'
    CleanTargetFolder: true

- task: qetza.replacetokens.replacetokens-task.replacetokens@3
  displayName: 'Replace tokens in **\*setParameters.xml'
  inputs:
    rootDirectory: 'c:\builddrops'
    targetFiles: '**\*setParameters.xml'

- task: PowerShell@2
  displayName: 'PowerShell Script Stop websites'
  inputs:
    targetType: filePath
    filePath: 'd:\iis\Pre Release WWWFULL UnifiedUI Enterprise.ps1'
  continueOnError: true

#- task: PowerShell@2
#  displayName: 'PowerShell Script'
#  inputs:
#    targetType: filePath
#    filePath: 'd:\iis\WebSiteSetup-wwwfull-nossl-withcert.ps1'
#    arguments: '-identitycertpassword ''$(identitycertpassword)'' -identitycertfilename $(identitycertFilename) -identitycertthumbprint $(IdentityServerSigningCertThumbprint) -identityserverhost $(identityserverhost) -webserverhost $(webserverhost) -apiserver2host $(apiserver2host) -useIdentityServer4 $(useIdentityServer4)'

- task: PowerShell@2
  displayName: 'PowerShell Script'
  inputs:
    targetType: filePath
    filePath: 'd:\iis\WebSiteSetup-wwwsandbox.ps1'
    arguments: '-sandboxname $(sandboxname)'

- task: PowerShell@2
  displayName: 'PowerShell Script Stop websites'
  inputs:
    targetType: filePath
    filePath: 'd:\iis\Pre Release WWWFULL UnifiedUI Enterprise.ps1'

#- task: IISWebAppDeploymentOnMachineGroup@0
#  displayName: 'Deploy IIS: Website/App: login (ID4)'
#  inputs:
#    WebSiteName: 'wwwUL\login'
#    Package: 'c:\BuildDrops\Identity4\$(artifact_build_number_id4).zip'
#    RemoveAdditionalFilesFlag: true
#    TakeAppOfflineFlag: true
