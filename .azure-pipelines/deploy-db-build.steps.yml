steps:
- checkout: self
- checkout: unified-login-scripts
  path: s/_unified-login-scripts

- task: JFrogToolsInstaller@1
  displayName: 'Artifactory Tools Installer'
  inputs:
    artifactoryConnection: 'artifactoryV2-IntEnv'
    cliInstallationRepo: 'jfrog-cli-v2'

- task: JFrogGenericArtifacts@1
  displayName: 'Artifactory Generic Download Landing UI'
  inputs:
    command: 'Download'
    connection: 'artifactoryV2-IntEnv'
    fileSpec: |
     {
       "files": [
         {
           "pattern": "rp-deployables-local/uty/UnifiedLogin/LandingRelease/$(artifact_build_number_uirelease)-landing-ui.zip",
           "target": "unified-login-landing-ui/",
           "explode": "true"
         }
       ]
     }

#- task: JFrogGenericArtifacts@1
#  displayName: 'Artifactory Generic Download Identity 4'
#  inputs:
