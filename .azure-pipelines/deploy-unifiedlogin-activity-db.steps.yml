- task: CopyFiles@2
  displayName: 'Copy Files to: D:\AuditDB\$(environment)\DB_Deploy'
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)/_ActivityDB/uty/UnifiedLogin/ActivityDB_V2/DB_AuditDBV2'
    TargetFolder: 'D:\AuditDB\$(environment)\DB_Deploy'
    CleanTargetFolder: true

- task: CopyFiles@2
