function setFocusOnFirstElement(bFirst) {
    var sFilter = bFirst ? "first" : "last";
    setTimeout(function () {
        try {
            if (window.frames[0]) {
                window.frames[0].$('textarea, input, select').filter(':visible:enabled:' + sFilter).focus();
            } else {
                $('textarea, input, select').filter(':visible:enabled:' + sFilter).focus();
            }
        } catch (e) { }
    }, 50);
}
function bindToTabKey() {
	$(".IFrameButtons table[type='button']").keydown(function(event) {
		btnTab(event);
	});
	$('textarea, input, table[type="button"]').not(".IFrameButtons table[type='button']").keydown(function (event) {
		elemTab(event);
	});
	$('select').parent().keydown(function (event) {
		elemTab(event);
	});
}

function btnTab(e) {
	try {
		if (e.keyCode === 9) {
			var oBtns = $("table[type='button']").filter(":visible");
			var currBtn = $(e.target || e.srcElement);
			if (oBtns.index(currBtn) === oBtns.length-1 && !e.shiftKey) {
				setFocusOnFirstElement(true);
				e.preventDefault();
			} else if (oBtns.index(currBtn) === 0 && e.shiftKey) {
				setFocusOnFirstElement(false);
				e.preventDefault();
			}
		}
	} catch (e) { }
}

function elemTab(e) {
	try {
		if (e.keyCode === 9) {
			
			var oElems = $("textarea, input, select, table[type='button']").not(".IFrameButtons table[type='button']").filter(":visible");
			var currElem = $(e.target || e.srcElement);
			var sFilter;
			if (oElems.index(currElem) === oElems.length-1 && !e.shiftKey) { //tab key without shift key	
				sFilter = "first";
			} else if (oElems.index(currElem) === 0 && e.shiftKey) {
				sFilter = "last";
			}
			
			if (window.parent.$(".IFrameButtons table[type='button']").get(0) && sFilter) {
				window.parent.$(".IFrameButtons table[type='button']").filter(":visible:" + sFilter).focus();
				e.preventDefault();
			} else if (sFilter) {
				$(".IFrameButtons table[type='button']").filter(":visible:" + sFilter).focus();
				e.preventDefault();
			}
		}
	} catch (e) { }
}

		function getCookie(name) {
			var dc, prefix, begin, end;
			dc = document.cookie;
			prefix = name + "=";
			begin = dc.indexOf("; " + prefix);

			if (begin === -1) {
				begin = dc.indexOf(prefix);
				if (begin !== 0) {
					return null;
				}
			}
			else {
				begin += 2;
			}

			end = dc.indexOf(";", begin);
			if (end === -1) {
				end = dc.length;
			}
			return unescape(dc.substring(begin + prefix.length, end));

		function DisplayMessages_callback(messageAction){
			if(typeof(messageAction) == "object")
			{
				messageAction = "DENY";
			} 
			switch (messageAction) {
				case "DENY":
					retVal = "DENY";
					break;
				case "RETRY":
					retVal = "RETRY";
					break;
				case "CONTINUE":
					retVal = "CONTINUE";
					break;
				default:
					retVal = DisplayMessages(gMessagePage, "?" + messageAction);
			}
			switch(messageAction) {
				case "DENY": 
					if (gArr[12] === "1") { //Stop him from logging in to onesite only if (he is an external user.
						txtPassword.value = "";
					}
					return;
					break;
				case "RETRY": 
					TryLogon();
					return;
					break;
			}
			getMessage();
			TryLogon_Continue();
			//return retVal;			
		}
		var gMessagePage;
		function DisplayMessages(messagePage, pageParams) {
			gMessagePage = messagePage;
			var messageAction, retVal;
			//document.domain = "realpage.com";
			top.SetPSCurrent('bUsingIFrame', true);
            // User passed oIframeData as an object, ensure that the passed in parameters (e.g. url, width, ...) are set appropriately on the object 
			var oIframeData = {"onHide" : DisplayMessages_callback};
            oIframeData.url = gMessagePage + pageParams;
            oIframeData.width = 800;
			oIframeData.fadeInTime = 1;
			oIframeData.fadeOutTime = 1;
			//messageAction = window.showModalDialog(messagePage + pageParams, self, "help:no;status:0;dialogWidth:800px;dialogHeight:450px;resizable:yes;scroll:no");
			if (parent.location.href.toLowerCase().indexOf("changeuser") > 0) {
				window.parent.parent.RealPage.UI.ShowIframeModalDialog(oIframeData);
			}
			else {
				window.parent.RealPage.UI.ShowIframeModalDialog(oIframeData);
			}
			return;
		} // end function DisplayMessages
		function TryLogon_Continue(){
			
			if (""  ===  "1") { //going to the SDE download monitor, not Onesite
				gsRedirectPage = (gsRedirectPage.replace(":100", ":221")).replace("shell/","SDESvc/External/Downloader/DownloadMonitor.asp");
			}
			else if (""  ===  "1") { //going to the Central Reports download page;
				gsRedirectPage = (gsRedirectPage.replace(":100", ":221")).replace("shell/","SDESvc/BL/HomePageListBL.asmx/SaveAs?FileID=&view=1&type=Report");
			}
			else if (""  ===  "1") { //going to the SDE file download page;
				gsRedirectPage = (gsRedirectPage.replace(":100", ":221")).replace("shell/", "SDESvc/BL/HomePageListBL.asmx/SaveAs?FileID=&view=1&type=Report");
				gsRedirectPage = gsRedirectPage.replace("multishell_cb/", "SDESvc/BL/HomePageListBL.asmx/SaveAs?FileID=&view=1&type=Report"); //michael added to allow viewing of reports in non ie browsers
				bSDEFileDownload = true;
			}
			else if (gsVersion  ===  "100") { //going to home office needs the summary-for-PMC features;
				gsRedirectPage = gsRedirectPage + "shell.htm?c=" + gArr[4] + "&u=100," + gArr[6];
			}
			else if (gsVersion <= "220") {
				gsRedirectPage = gsRedirectPage + "default.asp";
			}
			else if (""  !==  "") { // Screening interface
				gsRedirectPage = (gsRedirectPage.replace(":100", ":221")).replace("shell/","shell/InterfaceShell.htm?c=" + sCenters + "&u=221,1101&i=,,");
			}
			else {
				gsRedirectPage = gsRedirectPage + "shell.htm?c=" + gArr[4] + "&u=" + gArr[2] + "," + gArr[6] + "&t=" + gArr[10];
			}

			gsURLMsg = gArr[5];
			if (gsURLMsg !== undefined && gsURLMsg !== "OK") {
				// need to shut down the browser window;
				window.showModalDialog("https://www.realpage.com/signon/urlmessage.asp","","status:0;dialogWidth:450px;dialogHeight:200px;dialogLeft=220;dialogTop=330;resizable:no");
				closeWindow();
				return;
			}
			try {
				var retVal;
				retVal="";
				retVal=window.returnValue;
				if (retVal === "CHANGEUSER") {
					//we are in the change user modal... just return the value of the modal and exit, the shell will take care of loading the page
					window.returnValue = sRedirectPage;
					closeWindow();
					return;
				}
			}
			catch (ex) {
			}

			var oReturn = null;  // Default to null
			if (gjqErrDiv.html() === "") {
				// We had a valid login event, so proceed
				var sURL, nWidth, nHeight, sFull, sWinFeatures;
				nHeight = window.screen.availHeight;
				nWidth = window.screen.availWidth;
				sFull = "height=" + (nHeight-29) + " width=" + (nWidth-10) + " left=0 top=0";
				sURL = gsRedirectPage + "&AllowCB=";
				
					sURL = sURL + "1"
				
				
				if(strRPLogon !== "" ){
    				CheckWindowExitsAndUnLoad(sURL, sFull, true);
    				return false;
        		}
				if(strRPELogon !== "" ){
    				CheckWindowExitsAndUnLoad(sURL, sFull, true);
    				return false;
        		}
				if(window.parent && window.parent.location.href.indexOf("changeuser.htm") > 0 ){
					top.location = gsRedirectPage;
				}
				else{
					window.open(gsRedirectPage, "_blank", sFull, "true");
					jqTxtLogon.attr('value', '');
					jqPassword.attr('value', '');
				}
			}
		}
		function Login_CheckStateCallback(bRet){
			if ( typeof(bRet) == "object" || bRet === false) {
				if (gArr[4].substring(12, 1) === "0") {
					return;
				}
			}
			// Start OneSite Messaging - Jacinto;
			
				var oXmlMessages, messageAction, messagePage;
				oXmlMessages = NewXmlDOM();

				if (gArr[11] !== "") {
					oXmlMessages.loadXML(unescape(gArr[11]));
					if (oXmlMessages.selectNodes("//Response/Row[@ConfirmAction='1']").length > 0) {
						gjqErrDiv.html("Error occurred displaying messages");
						alert(oXmlMessages.selectSingleNode("//Response/Row[@ConfirmAction='1']").attributes.getNamedItem("TechnicalReasonFailed").value);
						return;
					}
				}
				else {
					oXmlMessages.loadXML("<root><MessageList></MessageList></root>");
				}

				if (oXmlMessages.documentElement.firstChild.childNodes.length) {

					messagePage = (gsRedirectPage.replace(":100", ":221")).replace("shell/","OMS/Default.htm");
					messagePage = messagePage.replace("multishell_cb/","OMS/Default.htm");
					//if (sInstallType === "single") {
					messagePage = messagePage.replace("/100/OMS/", "/OMS/"); //Strip out the /100/ if logging in to Central
					//}
					
					top.SetPSCurrent("xmlMessages",oXmlMessages.xml);
					messageAction = DisplayMessages(messagePage, "");
					return;
				}
			
			// End OneSite Messaging - Jacinto
			getMessage();	
			TryLogon_Continue();
		}
